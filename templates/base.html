<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema de Inventario{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='css/styles.css') }}?v=2">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🌱 Semillas VC - Mancy Biliana</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link {% block nav_ventas %}{% endblock %}" href="/">🛒 Ventas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% block nav_productos %}{% endblock %}" href="/productos">📦 Productos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% block nav_historial %}{% endblock %}" href="/ventas/listado">📋 Historial</a>
                    </li>
                </ul>
                <span class="navbar-text text-muted small">by Mancy Biliana</span>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Cierra automáticamente las alertas después de 3 segundos
        setTimeout(() => {
            document.querySelectorAll('.alert').forEach(alert => {
                new bootstrap.Alert(alert).close();
            });
        }, 3000);
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
